name: Deploy to Arch Linux Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy application
      run: |
        cd /home/csn
        echo "Stopping Flask..."
        pkill -9 -f "python.*cloud.py" || true
        sleep 2

        echo "Starting Flask..."
        cd /home/csn
        /home/csn/cloud_lab_env/bin/python /home/csn/cloud.py > /home/csn/flask.log 2>&1 &
        sleep 5

        echo "Checking Flask..."
        if curl -f http://127.0.0.1:8080/; then
          echo "✅ Flask is running"
        else
          echo "❌ Flask failed to start"
          cat /home/csn/flask.log
          exit 1
        fi

        echo "✅ Deployment finished at $(date)"
