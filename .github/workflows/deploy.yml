name: Deploy to Arch Linux Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy application
      run: |
        cd /home/csn
        echo "Stopping Flask..."
        pkill -9 -f "python.*cloud.py" || true
        sleep 2
        
        echo "Starting Flask..."
        source /home/csn/cloud_lab_env/bin/activate
        nohup python /home/csn/cloud.py > /home/csn/flask.log 2>&1 &
        sleep 5
        
        echo "Checking Flask..."
        curl -I http://127.0.0.1:8080/ || echo "ERROR: Flask not responding"
        ps aux | grep cloud.py | grep -v grep || echo "ERROR: Flask not running"
        
        echo "✅ Deployment finished at $(date)"
