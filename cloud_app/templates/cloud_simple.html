<!DOCTYPE html>
<html>
<head>
    <title>Cloud Lab</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .file-list { list-style: none; padding: 0; }
        .file-item { padding: 10px; margin: 5px 0; background: #f5f5f5; border-radius: 5px; }
        .file-icon { font-size: 24px; margin-right: 10px; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .flash.success { background: #d4edda; }
        .flash.warning { background: #fff3cd; }
    </style>
</head>
<body>
    <h1>☁️ Cloud Lab</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="files" multiple>
        <input type="submit" value="Upload">
    </form>
    
    <h2>Files:</h2>
    <ul class="file-list">
    {% for file in files %}
        <li class="file-item">
            <span class="file-icon">{{ file.icon }}</span>
            {{ file.name }} ({{ file.size }})
            <a href="/download/{{ file.id }}">📥</a>
            <a href="/delete/{{ file.id }}">🗑️</a>
        </li>
    {% endfor %}
    </ul>
</body>
</html>
